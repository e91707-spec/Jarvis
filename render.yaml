services:
  # Web Service
  - type: web
    name: jarvis-web
    env: python
    plan: free
    buildCommand: pip install --disable-pip-version-check --no-cache-dir -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 web_jarvis:app
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
    
  # No worker needed - file-free version uses direct API calls
